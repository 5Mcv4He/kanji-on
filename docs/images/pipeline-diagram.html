<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:900px; height:520px; overflow:hidden; font-family:"PingFang SC","Noto Serif SC",sans-serif; background:#0b0908; color:#c0b0a0; }
.card { width:900px; height:520px; position:relative; padding:36px 48px; }
.title { font-family:"Noto Serif SC","Songti SC",serif; font-size:28px; font-weight:900; color:#efe4d0; letter-spacing:0.06em; text-align:center; margin-bottom:28px; }

.pipeline { display:flex; align-items:flex-start; justify-content:center; gap:0; }
.stage { flex:1; text-align:center; position:relative; padding:0 6px; }
.stage-box { padding:20px 10px; border-radius:3px; min-height:160px; position:relative; }
.stage-icon { font-size:36px; margin-bottom:8px; }
.stage-head { font-size:18px; font-weight:700; letter-spacing:0.06em; margin-bottom:8px; }
.stage-desc { font-size:15px; line-height:1.55; letter-spacing:0.03em; }

.stage-1 .stage-box { background:rgba(100,140,180,0.08); border:1px solid rgba(100,140,180,0.15); }
.stage-1 .stage-head { color:#8ab4d8; }
.stage-1 .stage-icon { color:#6a9fd8; }
.stage-1 .stage-desc { color:#7a8a9a; }

.stage-2 .stage-box { background:rgba(200,140,80,0.08); border:1px solid rgba(200,140,80,0.15); }
.stage-2 .stage-head { color:#e0a040; }
.stage-2 .stage-icon { color:#d4954a; }
.stage-2 .stage-desc { color:#9a8a6a; }

.stage-3 .stage-box { background:rgba(140,180,120,0.08); border:1px solid rgba(140,180,120,0.15); }
.stage-3 .stage-head { color:#90b870; }
.stage-3 .stage-icon { color:#88a060; }
.stage-3 .stage-desc { color:#8a9a7a; }

.stage-4 .stage-box { background:rgba(220,100,80,0.06); border:1px solid rgba(220,100,80,0.12); }
.stage-4 .stage-head { color:#d07050; }
.stage-4 .stage-icon { color:#c5602e; }
.stage-4 .stage-desc { color:#a08070; }

.stage-5 .stage-box { background:rgba(184,71,46,0.08); border:1px solid rgba(184,71,46,0.2); }
.stage-5 .stage-head { color:#d47a3a; }
.stage-5 .stage-icon { color:#b8472e; }
.stage-5 .stage-desc { color:#a07050; }

.arrow { display:flex; align-items:center; padding-top:70px; color:#5a4a3a; font-size:22px; min-width:20px; justify-content:center; }

.bottom-line { text-align:center; margin-top:24px; font-size:17px; color:#6a5a4a; letter-spacing:0.04em; }
.bottom-line em { color:#d47a3a; font-style:normal; font-weight:600; }
</style>
</head>
<body>
<div class="card">
  <div class="title">从数据到规则：一条流水线</div>

  <div class="pipeline">
    <div class="stage stage-1">
      <div class="stage-box">
        <div class="stage-icon">▤</div>
        <div class="stage-head">丢特征</div>
        <div class="stage-desc">拼音 · 中古音<br>部件 · 结构<br>全部特征扔进去</div>
      </div>
    </div>
    <div class="arrow">→</div>
    <div class="stage stage-2">
      <div class="stage-box">
        <div class="stage-icon">⚙</div>
        <div class="stage-head">机器嗅</div>
        <div class="stage-desc">XGBoost<br>自动发现<br>特征组合模式</div>
      </div>
    </div>
    <div class="arrow">→</div>
    <div class="stage stage-3">
      <div class="stage-box">
        <div class="stage-icon">☰</div>
        <div class="stage-head">翻译成人话</div>
        <div class="stage-desc">决策树蒸馏<br>→ if-then 规则<br>一眼看完</div>
      </div>
    </div>
    <div class="arrow">→</div>
    <div class="stage stage-4">
      <div class="stage-box">
        <div class="stage-icon">◉</div>
        <div class="stage-head">人审 + 追踪</div>
        <div class="stage-desc">标精度 · 跨层验证<br>N5→N1 追踪<br>筛掉伪规律</div>
      </div>
    </div>
    <div class="arrow">→</div>
    <div class="stage stage-5">
      <div class="stage-box">
        <div class="stage-icon">◆</div>
        <div class="stage-head">集合覆盖</div>
        <div class="stage-desc">贪婪筛选<br>79,832 → 746 条<br>107:1 压缩</div>
      </div>
    </div>
  </div>

  <div class="bottom-line">人画框 → <em>机器嗅模式</em> → 人审结果 → <em>规则变成人的知识</em></div>
</div>
</body>
</html>
